spring.application.name=hotelmanagement

# Optional: copy application-local.properties.example → application-local.properties (gitignored) for local DB URL/password.
spring.config.import=optional:classpath:application-local.properties

# Use env vars or application-local.properties — do not commit real DB passwords to git.
# Default is localhost; if you see "Connection refused", either start Postgres locally OR set URL below via env or application-local.properties.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
# Remote DB (e.g. Supabase pooler): keep a small warm pool; avoid logging every SQL in prod (adds latency).
spring.datasource.hikari.maximum-pool-size=12
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
server.port=${PORT:8080}

# JWT configuration (set a strong secret in real env via ENV)
app.jwt.secret=VGhpcy1pcy1hLXN1cGVyLWxvbmcuc2VjdXJlLXNlY3JldC1rZXktZm9yLWRldg==
app.jwt.expiration-ms=86400000

# Set to true ONCE to clear existing hotel data and re-seed from CSV, then set back to false.
# Leaving true on every startup causes heavy DELETEs against remote DBs and can fail with "Connection reset".
# If the DB is empty (0 hotels), seeding runs automatically with reset=false — no need for true unless you must force TRUNCATE.
hotel.seed.reset=false

# Set to true once to delete ALL users and ALL bookings. Set back to false after restart. Or run scripts/delete-users-and-bookings.sql in your DB.
# app.reset.users-and-bookings=false

# Pexels API: unique image per hotel (200 req/hour). For production, use env: hotel.image.api.key=${PEXELS_API_KEY:}
hotel.image.api.key=${PEXELS_API_KEY:}

# --- Gmail SMTP (registration & booking confirmation emails) ---
# How to configure:
# 1. Use a Gmail account. Enable 2-Step Verification: Google Account → Security → 2-Step Verification → On.
# 2. Create an App Password: Google Account → Security → 2-Step Verification → App passwords →
#    select "Mail" and your device → Generate. Copy the 16-character password (e.g. abcd efgh ijkl mnop).
# 3. Either set environment variables (recommended, no secrets in repo):
#    SMTP_USERNAME=yourname@gmail.com
#    SMTP_PASSWORD=abcdefghijklmnop
#    MAIL_FROM=yourname@gmail.com
# 4. Or uncomment and fill below (do NOT commit real passwords to git):
#    spring.mail.username=yourname@gmail.com
#    spring.mail.password=your-16-char-app-password
#    app.mail.from=yourname@gmail.com
#
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:}
app.mail.fromName=Smart Hotel

# Customer support (shown in confirmation email)
app.support.email=${SUPPORT_EMAIL:support@smarthotel.com}
app.support.phone=${SUPPORT_PHONE:}

# --- Stripe (TEST MODE = no real money – ideal for semester/demo; no PAN/KYC needed) ---
# Test card: 4242 4242 4242 4242 | CVV: any 3 digits | Exp: any future date
# Optional: use env vars STRIPE_SECRET_KEY, STRIPE_PUBLISHABLE_KEY, STRIPE_ENABLED, APP_BASE_URL instead of committing keys
app.stripe.secret-key=${STRIPE_SECRET_KEY:}
app.stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY:}
app.stripe.enabled=${STRIPE_ENABLED:true}
app.stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
# Base URL for Stripe redirect (success/cancel). Change if you run on a different host/port
app.base-url=${APP_BASE_URL:https://hotelmanagement-production-o2db.up.railway.app}

# Smart Hotel mobile app store links (optional).
# Example: https://play.google.com/store/apps/details?id=com.example.smarthotel
app.mobile.play-store-url=${APP_MOBILE_PLAY_STORE_URL:}
app.mobile.app-store-url=${APP_MOBILE_APP_STORE_URL:}

# Cancellation policy: free cancel hours before check-in; after that one night charge
app.cancellation.free-hours-before=24
app.cancellation.one-night-fee-if-late=true

# Spring Actuator (ops visibility)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized
